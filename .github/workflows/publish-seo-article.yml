name: Publish SEO Article

on:
  # Runs every Monday and Thursday at 9am PT (17:00 UTC)
  schedule:
    - cron: "0 17 * * 1"   # Monday 9am PT
    - cron: "0 17 * * 4"   # Thursday 9am PT
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic to generate (leave empty for auto)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "google-genai==1.47.0"

      - name: Generate SEO article
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          REQUESTED_TOPIC: ${{ github.event.inputs.topic }}
        run: |
          if [ -n "$REQUESTED_TOPIC" ]; then
            python generate_seo_article.py --topic "$REQUESTED_TOPIC"
          else
            python generate_seo_article.py --auto
          fi

      - name: Validate generated files
        run: |
          python -m py_compile generate_seo_article.py
          test -f sitemap.xml
          ! git diff -- blog/ sitemap.xml | grep -Eiq '<script|javascript:|onerror=|onload='

      # Auto-publish clean articles; escalate risky ones to a review PR.
      # A "risky" article mentions claims we cannot substantiate (licensing,
      # insurance, warranty, background checks, star ratings, reviews) — those
      # never auto-publish. Everything else deploys straight to production.
      - name: Publish or escalate (claim guard)
        env:
          GH_TOKEN: ${{ github.token }}
          VERCEL_ORG_ID: team_DtG7MDZc4CZpjHLsPauTsGBA
          VERCEL_PROJECT_ID: prj_qETiPQcZLYd2A4FNhqmprx21nRUe
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          git config --global user.name "SEO Bot"
          git config --global user.email "bot@noahgaragesd.com"

          # Nothing generated? exit cleanly.
          if git diff --quiet -- blog/ sitemap.xml; then
            echo "No article changes generated."
            exit 0
          fi

          # Claim guard: same rules as tools/claim_guard.py, which is also the
          # blocking gate in deploy-production.yml. One definition, not two.
          if ! python tools/claim_guard.py $(git diff --name-only -- blog/); then
            echo "::warning::Claim guard tripped — opening a review PR instead of auto-publishing."
            BRANCH="seo-review/$(date +%Y%m%d)-${GITHUB_RUN_ID}"
            git switch -c "$BRANCH"
            git add blog/ sitemap.xml
            git commit -m "feat(seo): article needs editorial review (claim guard)"
            git push --set-upstream origin "$BRANCH"
            gh pr create \
              --title "SEO article: editorial review required (claim guard tripped)" \
              --body "Automated draft flagged by the claim guard (licensing / insurance / warranty / background-check / reviews / star ratings). Verify every claim, then merge to publish." \
              --base main \
              --head "$BRANCH"
            exit 0
          fi

          # Clean article -> commit to main and deploy in-workflow.
          # (A bot push uses GITHUB_TOKEN, which can't trigger deploy-production.yml,
          # so this job deploys to production itself.)
          git add blog/ sitemap.xml
          git commit -m "feat(seo): auto-publish new blog article [$(date +%Y-%m-%d)]"
          git push
          npm install -g vercel@50
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
