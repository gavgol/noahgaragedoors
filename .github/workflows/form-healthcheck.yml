name: Form Health Check

# Verifies the live lead form + tracking are intact, once a month.
# If anything is missing the job FAILS and GitHub emails the repo owner,
# so a silently-broken form (like the un-activated FormSubmit) can't happen again.
on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC on the 1st of every month
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live site and verify lead form + tracking
        run: |
          URL="https://www.noahgaragesd.com/"
          echo "Fetching $URL"
          HTML=$(curl -fsSL --retry 3 "$URL")

          fail=0
          check() {
            if printf '%s' "$HTML" | grep -qF "$1"; then
              echo "PASS: $2"
            else
              echo "FAIL: $2  (missing: $1)"
              fail=1
            fi
          }

          check 'id="quoteForm"'                           'Lead form present'
          check 'name="name"'                              'Name field present'
          check 'name="phone"'                             'Phone field present'
          check 'formSuccess'                              'Thank-you state present'
          check 'G-HPY4V3C8T5'                             'GA4 tag present'
          check '1708916410247553'                         'Meta Pixel present'

          if [ "$fail" -ne 0 ]; then
            echo "::error::Lead form health check FAILED - the live site is missing the form or tracking. Investigate immediately."
            exit 1
          fi
          echo "All checks passed."
