name: Form Health Check

# Verifies the live lead form + tracking are intact, once a month.
# If anything is missing the job FAILS and GitHub emails the repo owner,
# so a silently-broken form (like the un-activated FormSubmit) can't happen again.
on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC on the 1st of every month
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live site and verify lead form + tracking
        run: |
          URL="https://www.noahgaragesd.com/"
          echo "Fetching $URL"
          HTML=$(curl -fsSL --retry 3 "$URL")

          # Analytics is consent-gated: GA4 + Meta Pixel are loaded by
          # cookie-consent.js AFTER cookie consent, so their IDs are NOT in the
          # raw page HTML. Verify the loader is linked, then check the IDs
          # inside the consent script itself.
          CONSENT_URL="https://www.noahgaragesd.com/cookie-consent.js"
          echo "Fetching $CONSENT_URL"
          CONSENT=$(curl -fsSL --retry 3 "$CONSENT_URL")

          fail=0
          check() {
            # $1 = content, $2 = marker, $3 = label
            if printf '%s' "$1" | grep -qF "$2"; then
              echo "PASS: $3"
            else
              echo "FAIL: $3  (missing: $2)"
              fail=1
            fi
          }

          check "$HTML"    'id="quoteForm"'      'Lead form present'
          check "$HTML"    'name="name"'         'Name field present'
          check "$HTML"    'name="phone"'        'Phone field present'
          check "$HTML"    'formSuccess'         'Thank-you state present'
          check "$HTML"    'cookie-consent.js'   'Consent-gated analytics loader linked'
          check "$CONSENT" 'G-HPY4V3C8T5'        'GA4 tag present (in cookie-consent.js)'
          check "$CONSENT" '1708916410247553'    'Meta Pixel present (in cookie-consent.js)'

          if [ "$fail" -ne 0 ]; then
            echo "::error::Lead form health check FAILED - the live site is missing the form or tracking. Investigate immediately."
            exit 1
          fi
          echo "All checks passed."
