<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --blue:#2563EB;
    --amber:#F59E0B;
    --dark:#0A0A0F;
  }
  html,body{ background:#222; }
  .card{
    width:1080px; height:1350px;
    background:linear-gradient(160deg,#0A0A0F 0%,#10131c 55%,#0A0A0F 100%);
    font-family:'Inter',-apple-system,Helvetica,Arial,sans-serif;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  /* subtle blue glow accents */
  .card::before{
    content:""; position:absolute; top:-180px; right:-180px;
    width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle,rgba(37,99,235,.35),transparent 70%);
  }
  .card::after{
    content:""; position:absolute; bottom:120px; left:-200px;
    width:480px; height:480px; border-radius:50%;
    background:radial-gradient(circle,rgba(245,158,11,.18),transparent 70%);
  }

  /* HEADER */
  .header{
    position:relative; z-index:3;
    padding:46px 60px 30px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .logo-pill{
    background:#fff; border-radius:18px; padding:18px 34px;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }
  .logo-pill img{ height:84px; display:block; }
  .tagline{
    color:#cdd6e6; font-size:25px; font-weight:600; letter-spacing:3px;
    text-transform:uppercase; text-align:center;
  }
  .tagline b{ color:var(--amber); font-weight:800; }

  /* PHOTO STACK */
  .stack{
    position:relative; z-index:2;
    flex:1; min-height:0; display:flex; flex-direction:column;
    gap:14px; padding:8px 46px 0;
  }
  .panel{
    position:relative; flex:1; min-height:0; border-radius:22px; overflow:hidden;
    border:4px solid rgba(255,255,255,.08);
    box-shadow:0 18px 50px rgba(0,0,0,.55);
  }
  .panel img{ width:100%; height:100%; object-fit:cover; display:block; }
  .tag{
    position:absolute; top:22px; left:22px;
    font-size:28px; font-weight:900; letter-spacing:2px;
    padding:12px 28px; border-radius:12px; color:#fff;
    text-transform:uppercase;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .tag.before{ background:#dc2626; }
  .tag.after{ background:#16a34a; }
  /* arrow badge between panels */
  .arrow{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%); z-index:5;
    width:104px; height:104px; border-radius:50%;
    background:var(--amber);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px rgba(245,158,11,.55), 0 0 0 10px rgba(10,10,15,.85);
  }
  .arrow svg{ width:52px; height:52px; }

  /* FOOTER */
  .footer{
    position:relative; z-index:3;
    margin:18px 46px 40px;
    background:linear-gradient(100deg,var(--amber),#fbbf24);
    border-radius:24px; padding:30px 44px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 16px 44px rgba(245,158,11,.4);
  }
  .offer{ display:flex; flex-direction:column; line-height:1.05; }
  .offer .big{ font-size:62px; font-weight:900; color:#0A0A0F; letter-spacing:-1px; }
  .offer .sub{ font-size:26px; font-weight:700; color:#3a2c05; margin-top:4px; }
  .phone{
    text-align:right; display:flex; flex-direction:column; align-items:flex-end;
  }
  .phone .label{ font-size:21px; font-weight:700; color:#3a2c05; letter-spacing:2px; text-transform:uppercase; }
  .phone .num{
    font-size:46px; font-weight:900; color:#0A0A0F; letter-spacing:-.5px;
    display:flex; align-items:center; gap:12px;
  }
  .phone .num svg{ width:38px; height:38px; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-pill"><img src="logo.webp" alt="Noah Garage Doors"></div>
      <div class="tagline">Same-Day Repair &nbsp;·&nbsp; <b>San Diego County</b></div>
    </div>

    <div class="stack">
      <div class="panel">
        <img src="NOAHGRAGEBEFOREAFTER/BEFORE17.jpeg" alt="Before">
        <span class="tag before">Before</span>
      </div>

      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </div>

      <div class="panel">
        <img src="NOAHGRAGEBEFOREAFTER/AFTER17.jpeg" alt="After">
        <span class="tag after">After</span>
      </div>
    </div>

    <div class="footer">
      <div class="offer">
        <span class="big">$50 OFF</span>
        <span class="sub">Any repair · Free estimate</span>
      </div>
      <div class="phone">
        <span class="label">Call now</span>
        <span class="num">
          <svg viewBox="0 0 24 24" fill="#0A0A0F"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.02-.24 11.36 11.36 0 003.56.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.56 1 1 0 01-.24 1.02l-2.21 2.21z"/></svg>
          (619) 572-4266
        </span>
      </div>
    </div>
  </div>
</body>
</html>
